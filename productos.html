<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo de Productos IMECIXT - Equipos de Seguridad Industrial">
    <title>Productos - IMECIXT</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/filters.css">
</head>
<body>
    
    <!-- Header (se carga dinámicamente) -->
    <div id="header-container"></div>

    <!-- Hero de Productos -->
    <section class="pt-24 sm:pt-28 md:pt-32 pb-6 sm:pb-8 bg-gradient-to-r from-red-500 via-red-600 to-red-800 text-white">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-2 sm:mb-3">Nuestros Productos</h1>
            <p class="text-base sm:text-lg text-red-100 max-w-2xl mx-auto px-2">Catálogo completo de equipos y productos de seguridad industrial contra incendios</p>
        </div>
    </section>

    <!-- Products Section -->
    <section id="productos" class="py-8 bg-white">
        <div class="container mx-auto px-4">
            <!-- Productos se cargan dinámicamente desde JS -->
            <div id="productos-container"></div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contacto" class="py-12 sm:py-16 bg-gradient-to-r from-gray-50 to-gray-100">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-3 sm:mb-4 text-gray-800">¿Necesitas más información?</h2>
            <p class="text-base sm:text-lg text-gray-600 mb-6 sm:mb-8 max-w-xl mx-auto">Contáctanos para cotizaciones y asesoramiento personalizado</p>
            <a href="https://wa.me/51930210841?text=Hola,%20me%20interesa%20información%20sobre%20sus%20productos%20de%20seguridad" 
               target="_blank"
               class="inline-flex items-center gap-2 sm:gap-3 bg-green-500 hover:bg-green-600 text-white font-bold py-3 sm:py-4 px-6 sm:px-8 rounded-full shadow-lg transform hover:-translate-y-1 transition duration-300 text-sm sm:text-base">
                <i class="fab fa-whatsapp text-xl sm:text-2xl"></i>
                <span>Contactar por WhatsApp</span>
            </a>
        </div>
    </section>

    <!-- Footer (se carga dinámicamente) -->
    <div id="footer-container"></div>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/51930210841?text=Hola,%20me%20interesa%20información%20sobre%20sus%20productos%20de%20seguridad" 
       target="_blank" 
       class="whatsapp-float"
       aria-label="Contactar por WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- JavaScript Files -->
    <script src="js/products.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
